site_name: Cloud De-coded with Rushikesh
site_description: A Blog about Cloud Computing and Technology.
site_url: https://sitename.example
repo_name: https://github.com/rushideshmukh-tech/.github

theme:
  features:
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.annotate
    - content.code.copy
    - content.code.select
  favicon: images/logo.png
  logo: images/logo.png
  icon:
    repo: fontawesome/brands/github
  name: material
  custom_dir: overrides
  palette:
    # Dark Mode
    - scheme: slate
      primary: blue grey
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Dark mode
    # Light Mode
    - scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Light mode
plugins:
  - search
  - blog:
      enabled: true
      blog_dir: blog
      authors_file: .authors.yml
      blog_toc: false
      post_dir: "{blog}/posts"
      categories_allowed:
        - Technology
        - azure
        - introduction
        - cloud
        - bicep
        - terraform
        - kubernetes
        - devops
        - framework
      post_url_format: "{slug}"
  - tags:
  - rss:
      match_path: "blog/posts/*"
      pretty_print: true
      date_from_meta:
        as_creation: date.created
        as_update: date.updated


extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rushideshmukh-tech
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/rushi-deshmukh/

markdown_extensions:
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
        generic: true
  - footnotes
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.mark
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
hooks:
  - hooks/socialmedia.py

copyright: "Copyright © 2025 <a href='https://github.com/rushideshmukh-tech'>Rushikesh A. Deshmukh</a>. All rights reserved."


